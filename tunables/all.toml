kernel_dir = "~/linux-6.14.0-xkernel"

## All kernel tunables for Xkernel
## Usage: xkernel-tool build tunables/all.toml
## NOTE: safe_spans removed — auto-SS derives them from /proc/kcore
##       for the running kernel. Manual spans were for 6.14.0-xkernel only.

